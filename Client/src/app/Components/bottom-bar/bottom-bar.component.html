<div class="radial-menu-container" [class.expanded]="isMenuExpanded">
  <button class="center-btn" (click)="toggleMenu()" aria-label="Apri menu">
    <img src="/Img/Logo.png" alt="RM">
  </button>

  <div class="menu-overlay" [hidden]="!isMenuExpanded" (click)="closeMenu()"></div>

  <div class="radial-buttons">
    <button
      class="radial-btn radial-btn-top"
      (click)="goToHome()"
      [class.active]="activeSection === 'home'"
      title="Home">
      <i class="bi bi-house"></i>
      <span>HOME</span>
    </button>

    <button
      class="radial-btn radial-btn-top-right"
      (click)="goToMap()"
      [class.active]="activeSection === 'map'"
      title="Mappa">
      <i class="bi bi-map"></i>
      <span>MAPPA</span>
    </button>

    <button
      class="radial-btn radial-btn-right"
      (click)="goToScan()"
      [class.active]="activeSection === 'scan'"
      title="Scan">
      <i class="bi bi-qr-code-scan"></i>
      <span>SCAN</span>
    </button>

    <button
      class="radial-btn radial-btn-bottom-right"
      (click)="goToSettings()"
      [class.active]="activeSection === 'settings'"
      title="Impostazioni">
      <i class="bi bi-gear"></i>
      <span>IMPOSTAZIONI</span>
    </button>

    <button
      class="radial-btn radial-btn-bottom"
      [hidden]="userRole !== 'user'"
      (click)="goToParenti()"
      [class.active]="activeSection === 'parenti'"
      title="Parenti">
      <i class="bi bi-people"></i>
      <span>PARENTI</span>
    </button>
    <button
      class="radial-btn radial-btn-bottom"
      [hidden]="userRole !== 'employee'"
      (click)="goToGestione()"
      [class.active]="activeSection === 'gestione'"
      title="Gestione">
      <i class="bi bi-shield-check"></i>
      <span>GESTIONE</span>
    </button>
    <button
      class="radial-btn radial-btn-bottom"
      [hidden]="userRole !== null"
      (click)="goToRegister()"
      [class.active]="activeSection === 'register'"
      title="Registrati">
      <i class="bi bi-person-plus"></i>
      <span>REGISTRATI</span>
    </button>
  </div>
</div>
