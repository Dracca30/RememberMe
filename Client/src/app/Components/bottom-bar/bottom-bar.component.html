<div class="radial-menu-container" [class.expanded]="isMenuExpanded">
  <!-- Bottone centrale -->
  <button class="center-btn" (click)="toggleMenu()">
    <img src="/Img/Logo.png" alt="RM" style="height: 100px;">
  </button>

  <!-- Overlay che chiude il menu -->
  @if (isMenuExpanded) {
    <div class="menu-overlay" (click)="closeMenu()"></div>
  }

  <!-- Bottoni radiali -->
  <div class="radial-buttons">
    <!-- Home - top -->
    <button 
      class="radial-btn radial-btn-top"
      (click)="goToHome()"
      [class.active]="activeSection === 'home'"
      title="Home">
      <i class="bi bi-house"></i>
      <span>HOME</span>
    </button>

    <!-- Map - top-right -->
    <button 
      class="radial-btn radial-btn-top-right"
      (click)="goToMap()"
      [class.active]="activeSection === 'map'"
      title="Mappa">
      <i class="bi bi-map"></i>
      <span>MAPPA</span>
    </button>

    <!-- Scan - right -->
    <button 
      class="radial-btn radial-btn-right"
      (click)="goToScan()"
      [class.active]="activeSection === 'scan'"
      title="Scan">
      <i class="bi bi-qr-code-scan"></i>
      <span>SCAN</span>
    </button>

    <!-- Settings - bottom-right -->
    <button 
      class="radial-btn radial-btn-bottom-right"
      (click)="goToSettings()"
      [class.active]="activeSection === 'settings'"
      title="Impostazioni">
      <i class="bi bi-gear"></i>
      <span>IMPOSTAZIONI</span>
    </button>

    <!-- User section (Parenti/Gestione/Registrati) - bottom -->
    @if (userRole === 'user') {
      <button 
        class="radial-btn radial-btn-bottom"
        (click)="goToParenti()"
        [class.active]="activeSection === 'parenti'"
        title="Parenti">
        <i class="bi bi-people"></i>
        <span>PARENTI</span>
      </button>
    } @else if (userRole === 'employee') {
      <button 
        class="radial-btn radial-btn-bottom"
        (click)="goToGestione()"
        [class.active]="activeSection === 'gestione'"
        title="Gestione">
        <i class="bi bi-shield-check"></i>
        <span>GESTIONE</span>
      </button>
    } @else if (userRole === null) {
      <button 
        class="radial-btn radial-btn-bottom"
        (click)="goToRegister()"
        [class.active]="activeSection === 'register'"
        title="Registrati">
        <i class="bi bi-person-plus"></i>
        <span>REGISTRATI</span>
      </button>
    }
  </div>
</div>
