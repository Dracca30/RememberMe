<div class="login-modal-overlay" *ngIf="isOpen" (click)="closeModal()">
  <div class="login-modal" (click)="$event.stopPropagation()">
    <button class="close-btn" (click)="closeModal()" aria-label="Chiudi">
      <i class="bi bi-x-lg"></i>
    </button>

    <div class="modal-content">
      <div class="login-icon">
        <i class="bi bi-box-arrow-in-right"></i>
      </div>
      
      <h2>Accedi al tuo account</h2>
      <p class="login-subtitle">Inserisci le tue credenziali per continuare</p>

      <form (submit)="handleLogin($event)" class="login-form">
        <div class="form-group">
          <label for="email">Email</label>
          <input 
            type="email" 
            id="email"
            placeholder="nome@example.com" 
            [(ngModel)]="loginEmail" 
            name="email" 
            required>
        </div>

        <div class="form-group">
          <label for="password">Password</label>
          <input 
            type="password" 
            id="password"
            placeholder="••••••••" 
            [(ngModel)]="loginPassword" 
            name="password" 
            required>
        </div>

        <button type="submit" class="login-btn primary">
          <i class="bi bi-box-arrow-in-right"></i>
          Accedi
        </button>
      </form>

      <div class="login-footer">
        <p>Non hai un account? <a routerLink="/register" (click)="closeModal()">Registrati</a></p>
        <p><a href="#" (click)="openForgotModal()">Password dimenticata?</a></p>
      </div>
    </div>
  </div>
</div>

<!-- Forgot password modal -->
<div class="forgot-modal-overlay" *ngIf="showForgot" (click)="closeForgot()">
  <div class="forgot-modal" (click)="$event.stopPropagation()">
    <button class="close-btn" (click)="closeForgot()" aria-label="Chiudi">
      <i class="bi bi-x-lg"></i>
    </button>
    <div class="modal-content">
      <h3>Recupera Password</h3>
      <p>Inserisci la tua email per ricevere istruzioni</p>
      <form (submit)="handleForgot($event)">
        <div class="form-group">
          <label for="forgot-email">Email</label>
          <input id="forgot-email" type="email" [(ngModel)]="forgotEmail" name="forgotEmail" required />
        </div>
        <div class="modal-actions">
          <button type="button" class="btn secondary" (click)="closeForgot()">Annulla</button>
          <button type="submit" class="btn primary">Invia</button>
        </div>
      </form>
    </div>
  </div>
</div>
