<nav class="desktop-navbar" *ngIf="isDesktop">
  <div class="navbar-container">
    <div class="navbar-brand">
      <img class="navbar-title" src="/Img/Logo.png" alt="REMEMBER ME">
    </div>

    <div class="navbar-menu">
      <button (click)="goToHome()" class="nav-btn" [class.active]="activeSection === 'home'">
        <i class="bi bi-house"></i>
        <span>Home</span>
      </button>

      <button (click)="goToMap()" class="nav-btn" [class.active]="activeSection === 'map'">
        <i class="bi bi-map"></i>
        <span>Mappa</span>
      </button>

      <!-- Visibile solo agli USER loggati -->
      <button
        *ngIf="isLoggedIn && userRole === 'user'"
        (click)="goToParenti()"
        class="nav-btn"
        [class.active]="activeSection === 'parenti'">
        <i class="bi bi-people"></i>
        <span>Parenti</span>
      </button>

      <!-- Visibile solo agli EMPLOYEE loggati -->
      <button
        *ngIf="isLoggedIn && userRole === 'employee'"
        (click)="goToAggiungiDeceduto()"
        class="nav-btn"
        [class.active]="activeSection === 'aggiungi-deceduto'">
        <i class="bi bi-plus-circle"></i>
        <span>Aggiungi deceduto</span>
      </button>

      <button (click)="goToSettings()" class="nav-btn" [class.active]="activeSection === 'settings'">
        <i class="bi bi-gear"></i>
        <span>Impostazioni</span>
      </button>

      <!-- Bottone Registrazione per utenti non autenticati -->
      <button
        *ngIf="!isLoggedIn"
        (click)="goToRegister()"
        class="nav-btn register-btn"
        [class.active]="activeSection === 'register'">
        <i class="bi bi-person-plus"></i>
        <span>Registrati</span>
      </button>
    </div>
  </div>
</nav>
