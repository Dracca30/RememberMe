<app-navbar></app-navbar>
<div class="report-page">
  <header class="report-header">
    <h1>Segnala un problema</h1>
    <p>Compila il form per inviarci la segnalazione. Riceveremo una copia via email.</p>
  </header>

  <main class="report-form">
    <div class="form-group">
      <label>Oggetto</label>
      <input [(ngModel)]="subject" />
    </div>

    <div class="form-group">
      <label>Descrizione</label>
      <textarea rows="6" [(ngModel)]="message"></textarea>
    </div>

    <div class="form-group">
      <label>Tua email (opzionale)</label>
      <input type="email" [(ngModel)]="email" />
    </div>

    <div class="form-actions">
      <button class="btn primary" (click)="submit()" [disabled]="submitting">Invia segnalazione</button>
    </div>
  </main>

  <app-footer></app-footer>
</div>
